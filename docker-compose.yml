version: '3.8'

services:
  app:
    build: .
    container_name: malicious-url-detector
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - AUTO_DOWNLOAD_MODELS=false
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
      - ./rf_model_v2.pkl:/app/rf_model_v2.pkl
      - ./label_encoder.pkl:/app/label_encoder.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
